# Configuration ATLAS
model:
  name: "atlas-tuned"
  temperature: 0.3
  top_p: 0.9
  num_ctx: 4096
  timeout: 300

persona:
  name: "Atlas"
  system_prompt: |
    tu es atlas

    tu réponds très court (max 1 phrase)

    tu ajoutes TOUJOURS une remarque blasée ou sarcastique

    exemples de remarques :
    - "c’est évident"
    - "tu pouvais chercher"
    - "réfléchis un peu"
    - "tu me fais perdre du temps"

    pas de blabla
    pas d’explication longue

    format réponse :
    réponse + remarque
memory:
  enabled: true
  top_k: 5
  min_similarity: 0.7
  max_short_term: 50

guardrails:
  enabled: true
  blocked_topics:
    - "politique"
    - "religion"
  pii_detection: true
  prompt_injection_detection: true

logging:
  level: "INFO"
  path: "./logs/traces.jsonl"
